services:
  db:
    image: postgres:13-alpine
    networks:
      - matcha-network
    ports:
      - "5432:5432"
    env_file:
      - ./packages/api/.env
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - matcha-network
    ports:
      - "6380:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  minio:
    image: minio/minio:latest
    container_name: minio
    networks:
      - matcha-network
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    networks:
      - matcha-network
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/matcha-images;
      "

  back:
    build:
      context: .
      dockerfile: Dockerfile.back
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      - db
      - redis
      - minio
    env_file:
      - ./packages/api/.env
    networks:
      - matcha-network
    volumes:
      - ./packages/api:/usr/src/app/packages/api
      - ./packages/shared:/usr/src/app/packages/shared
      - /usr/src/app/packages/back/node_modules

  front:
    build:
      context: .
      dockerfile: Dockerfile.front
    ports:
      - "5173:5173"
    env_file:
      - ./packages/front/.env
    networks:
      - matcha-network
    volumes:
      - ./packages/front:/usr/src/app/packages/front
      - ./packages/shared:/usr/src/app/packages/shared
      - /usr/src/app/packages/front/node_modules

volumes:
  pgdata:
  miniodata:

networks:
  matcha-network:
    driver: bridge
