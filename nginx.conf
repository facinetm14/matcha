events {}
http {
  server {
    listen 80;
    server_name matcha.facinetkouyate.dev;
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
    location / {
      return 301 https://$host$request_uri;
    }
  }
  server {
    listen 443 ssl;
    server_name matcha.facinetkouyate.dev;
    ssl_certificate /etc/letsencrypt/live/matcha.facinetkouyate.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matcha.facinetkouyate.dev/privkey.pem;
    location / {
      proxy_pass http://front:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api {
      proxy_pass http://back:5000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /socket.io {
      proxy_pass http://back:5000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }
  }
}
