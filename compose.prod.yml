services:
  db:
    image: postgres:13-alpine
    networks:
      - matcha-network
    env_file:
      - ./packages/api/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    networks:
      - matcha-network
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped

  back:
    build:
      context: .
      dockerfile: Dockerfile.back.prod
    depends_on:
      - db
      - redis
    env_file:
      - ./packages/api/.env
    networks:
      - matcha-network
    restart: unless-stopped

  front:
    build:
      context: .
      dockerfile: Dockerfile.front.prod
    networks:
      - matcha-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot
    depends_on:
      - front
      - back
    networks:
      - matcha-network
    restart: unless-stopped
  
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock
    command: /bin/sh -c "trap exit TERM; while :; do certbot renew --deploy-hook 'docker exec nginx nginx -s reload';  sleep 60d; done"
    depends_on:
      - nginx

volumes:
  pgdata:
  certbot-etc:
  certbot-www:

networks:
  matcha-network:
    driver: bridge
