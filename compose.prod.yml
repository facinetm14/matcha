services:
  db:
    image: postgres:13-alpine
    networks:
      - matcha-network
    env_file:
      - ./packages/api/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
  redis:
    image: redis:7-alpine
    networks:
      - matcha-network
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped
  back:
    build:
      context: .
      dockerfile: Dockerfile.back.prod
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.matcha-api.rule=Host(`matcha.facinetkouyate.dev`) && PathPrefix(`/api`)"
      - "traefik.http.routers.matcha-api.entrypoints=websecure"
      - "traefik.http.routers.matcha-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.matcha-api.loadbalancer.server.port=5000"
    depends_on:
      - db
      - redis
    env_file:
      - ./packages/api/.env
    networks:
      - matcha-network
      - proxy-network
    restart: unless-stopped
  front:
    build:
      context: .
      dockerfile: Dockerfile.front.prod
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.matcha.rule=Host(`matcha.facinetkouyate.dev`)"
      - "traefik.http.routers.matcha.entrypoints=websecure"
      - "traefik.http.routers.matcha.tls.certresolver=letsencrypt"
      - "traefik.http.services.matcha.loadbalancer.server.port=80"
    networks:
      - matcha-network
      - proxy-network 
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  pgdata:

networks:
  matcha-network:
    driver: bridge
  proxy-network:
    external: true
